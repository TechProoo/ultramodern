# Netlify config for the AMC Manager frontend.
# In the Netlify import UI, set "Base directory" to `frontend` so this file is
# found and all paths below resolve relative to the frontend folder.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 8 requires Node 20+
  NODE_VERSION = "20"

# SPA fallback — serve index.html for any path so client-side routing/deep
# links don't 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
